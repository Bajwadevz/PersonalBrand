<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#000000"/>
  <!-- White top face of cube -->
  <polygon points="50,10 82,26 50,42 18,26" fill="#FFFFFF"/>
  <!-- Left face -->
  <polygon points="18,26 18,62 50,78 50,42" fill="#CCCCCC"/>
  <!-- Right face -->
  <polygon points="82,26 82,62 50,78 50,42" fill="#EEEEEE"/>
  <!-- N letter on front face -->
  <text x="50" y="60" text-anchor="middle" fill="#000000" font-family="Arial Black, sans-serif" font-weight="900" font-size="24">N</text>
</svg>
